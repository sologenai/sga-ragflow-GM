version: '3.8'

services:
  # Frontend development server
  ragflow-web-dev:
    image: node:18-alpine
    container_name: ragflow-web-dev
    working_dir: /app
    ports:
      - "3001:8000"  # 使用3001端口避免冲突
    volumes:
      - ../web:/app
      - /app/node_modules  # 避免本地node_modules冲突
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=8000
    stdin_open: true
    tty: true
